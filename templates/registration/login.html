{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fractaw Modules</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --fractaw-bg: #1E2327;          /* Grafite Noturno Quente */
            --fractaw-card-bg: #252B30;     /* Elevação dos Blocos */
            --fractaw-primary: #F4B942;     /* Amarelo-Mel Luminoso */
            --fractaw-primary-hover: #FFC857;/* Amarelo Hover/Destaque */
            --fractaw-text: #E7ECEF;        /* Cinza Névoa Claro (Texto) */
            --fractaw-text-muted: #B8C0C5;  /* Cinza Névoa Secundário */
            --fractaw-accent: #4FA7A3;      /* Azul-Petróleo Iluminado */
            --fractaw-accent-deep: #2F6F6D; /* Elementos Profundos */
        }

        body {
            background-color: var(--fractaw-bg);
            color: var(--fractaw-text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card de Autenticação */
        .login-card {
            background-color: var(--fractaw-card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        /* Inputs Customizados */
        .form-control-fractaw {
            background-color: rgba(0, 0, 0, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: var(--fractaw-text) !important;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .form-control-fractaw:focus {
            border-color: var(--fractaw-accent) !important;
            box-shadow: 0 0 0 3px rgba(79, 167, 163, 0.15) !important;
            outline: none;
        }

        /* Checkbox */
        .form-check-input-fractaw:checked {
            background-color: var(--fractaw-accent) !important;
            border-color: var(--fractaw-accent) !important;
        }

        .form-check-input-fractaw {
            background-color: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        /* Botão de Entrada Primário */
        .btn-fractaw-submit {
            background-color: var(--fractaw-primary);
            border: 1px solid var(--fractaw-primary);
            color: #1E2327;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-fractaw-submit:hover {
            background-color: var(--fractaw-primary-hover);
            border-color: var(--fractaw-primary-hover);
            color: #1E2327;
            box-shadow: 0 0 15px rgba(244, 185, 66, 0.35);
        }

        /* Links */
        .link-fractaw {
            color: var(--fractaw-accent);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s ease;
        }

        .link-fractaw:hover {
            color: var(--fractaw-primary-hover);
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center">
        <div class="login-card">
            
            <div class="text-center mb-4">
                <div class="fs-2 fw-bold text-white mb-1">
                    <i class="bi bi-columns-gap" style="color: var(--fractaw-accent);"></i> Fractaw
                </div>
                <div class="small uppercase tracking-wider text-uppercase fw-semibold" style="color: var(--fractaw-primary); letter-spacing: 1px; font-size: 0.75rem;">
                    ERP MODULAR
                </div>
            </div>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                {% if form.errors %}
                <div class="alert alert-danger py-2 px-3 small border-0 mb-3" style="background-color: rgba(220, 53, 69, 0.15); color: #ff6b6b;">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>Usuário ou senha incorretos.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label for="id_username" class="form-label small fw-semibold text-muted" style="color: var(--fractaw-text-muted) !important;">Identificação de Usuário</label>
                    <div class="input-group">
                        <input type="text" name="username" id="id_username" class="form-control form-control-fractaw" placeholder="Ex: admin" required autofocus>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="id_password" class="form-label small m-0 fw-semibold" style="color: var(--fractaw-text-muted) !important;">Chave de Acesso</label>
                        <a href="#" class="link-fractaw small">Esqueceu?</a>
                    </div>
                    <input type="password" name="password" id="id_password" class="form-control form-control-fractaw" placeholder="••••••••" required>
                </div>

                <div class="mb-4 d-flex align-items-center">
                    <input type="checkbox" name="remember_me" id="remember_me" class="form-check-input form-check-input-fractaw me-2">
                    <label for="remember_me" class="form-check-label small select-none" style="color: var(--fractaw-text-muted); cursor: pointer;">Manter terminal conectado</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-fractaw-submit btn-block">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sessão Operacional
                    </button>
                </div>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-10">
                <span class="small" style="color: var(--fractaw-text-muted); font-size: 0.75rem;">
                    Conexão segura corporativa &bull; v2.0
                </span>
            </div>

        </div>
    </div>

</body>
</html>
