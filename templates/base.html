{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fractaw Modules{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --fractaw-bg: #1E2327;
            /* Grafite Noturno Quente */
            --fractaw-card-bg: #252B30;
            /* Variação ligeiramente mais clara para elevação */
            --fractaw-primary: #F4B942;
            /* Amarelo-Mel Luminoso */
            --fractaw-primary-hover: #FFC857;
            /* Amarelo Destaque */
            --fractaw-text: #E7ECEF;
            /* Cinza Névoa Claro */
            --fractaw-text-muted: #B8C0C5;
            /* Cinza Névoa Secundário */
            --fractaw-accent: #4FA7A3;
            /* Azul-Petróleo Iluminado */
            --fractaw-accent-deep: #2F6F6D;
            /* Elementos Profundos */
        }

        body {
            background-color: var(--fractaw-bg);
            color: var(--fractaw-text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .text-muted-custom {
            color: var(--fractaw-text-muted) !important;
        }

        .text-primary-custom {
            color: var(--fractaw-primary) !important;
        }

        .text-accent-custom {
            color: var(--fractaw-accent) !important;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="d-flex flex-column" style="min-height: 100vh;">

    {% include 'includes/header.html' %}

    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
